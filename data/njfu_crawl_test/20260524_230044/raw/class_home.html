<script language="javascript">

function queryKsap(obj) {
	search(obj);
}
function search(obj){
	

	//判断是否选了周次并比较大小
	var zc1 = $("#zc1").val();
	var zc2 = $("#zc2").val();

	if(zc1!=""&&zc2!=""){
		zc1 = parseInt(zc1);
		zc2 = parseInt(zc2);
		if(zc1>zc2){
			alert("开始周次不能大于结束周次！");
			return false;
		}
	}
	
	var jc1 = $("#jc1").val();
	var jc2 = $("#jc2").val();
	if(jc1!="" && jc2!=""){  
		if(parseInt(jc1) > parseInt(jc2)){
			alert("开始节次不能大于结束节次！");
			return false;
		}
	}
	
	var skxq1 = $("#skxq1").val();
	var skxq2 = $("#skxq2").val();
	if(skxq1!="" && skxq2!=""){  
		if(parseInt(skxq1) > parseInt(skxq2)){
			alert("开始星期不能大于结束星期！");
			return false;
		}
	}
	var kbjcmsid = $("#kbjcmsid").val();
	if(kbjcmsid == ""){
		alert("请选择时间模式！");
		return false;
	}
	document.getElementById('Form1').submit();
}

function onchangeYxOrKsnd(obj){
	var skyx = $("#skyx").val();
	var sknj = $("#sknj").val();

	//联动专业
    $.ajax({
        type : "GET",
        async:false, 
        url : "/jsxsd/kbcx/getZyByAjax",
        data : "&skyx="+skyx+"&sknj="+sknj,
        dataType: "json",
        success : function(msg) {
        	AddOptions(msg,"skzy");
        }
    });
	
}

function selectLd(obj){
	var skyx = $("#skyx").val();
	var sknj = $("#sknj").val();
	var skzy = $("#skzy").val();

	//联动专业
	$.ajax({
		type : "GET",
		async:false,
		url : "/jsxsd/kbcx/getBjByAjax",
		data : "&skyx="+skyx+"&sknj="+sknj+"&skzy="+skzy,
		dataType: "json",
		success : function(msg) {
			AddOptions(msg,"skbjid");
		}
	});

}

function AddOptions(data,id){
	var obj = $("#"+id);
	obj.empty();//清除
	obj.append("<option value=''>-请选择-</option>");
	for(var i=0;i<data.length;i++){
		var json = data[i];
		obj.append("<option value='"+json.dm+"'>"+json.dm_mc+"</option>");
	}
}
initJc(document.getElementById("xnxqh"));	
	function initJc(obj){
		var kbjcmsid = document.getElementById("kbjcmsid").value;
		$.ajax({
			type: "GET",
			url: "/jsxsd/kbxx/initJc",
			data: {xnxq:obj.value,kbjcmsid:kbjcmsid},
			dataType: "json",
			success: function(data){
				var jc = $("#jc1");
				var jc2 = $("#jc2");
				 if(data.success){ 
				 	var maxjc = data.mtdjs;
					var jc = $("#jc1");
					var jc2 = $("#jc2");
					var length = $("#jc1")[0].options.length;
					if(length != maxjc+1){
						jc.empty();
						jc2.empty();
						jc.append("<option value=''>-请选择-</option>");
						jc2.append("<option value=''>-请选择-</option>");
						for (var i=1;i<=maxjc;i++){
							if(i<10){
								jc.append("<option value='0"+i+"'>0"+i+"</option>");
								jc2.append("<option value='0"+i+"'>0"+i+"</option>");
							}else{
								jc.append("<option value='"+i+"'>"+i+"</option>");
								jc2.append("<option value='"+i+"'>"+i+"</option>");
							}
						}
					}
				}else{
					alert("查询节次出错，请确认是否设置了该学期课表节次！");
					jc.empty();
					jc2.empty();
					jc.append("<option value=''>-请选择-</option>");
					jc2.append("<option value=''>-请选择-</option>");
					return false;
				} 
							
			}
		});
		
	}

$(function(){
	//edit by wangwei 2018.9.18 增加上课班级检索功能
	$("#skbj").autocomplete({
		paramName: "skbj",
		serviceUrl: "/jsxsd/kbcx/querySkbj",
		minChars: 1,
		noCache: true,
		dataType: "json",
		type: "POST",
		autoSelectFirst: true,
		delimiter: ",",
		params: {"maxRow": "10"},
		onSearchStart: function(query) {
			if($("#skbj").val().lastIndexOf(",") > -1) {
				$("#skbjid").val($("#skbj").val().substring(0, $("#skbj").val().lastIndexOf(",")));
			} else {
				$("#skbjid").val("");
			}
		},
		transformResult: function(response) {
			 if(response.list.length == 0){
				var data =  {"xx04id": "","bj": "未检索到数据"}
				 response.list.push(data);
			}

	        return {
	            suggestions: $.map(response.list, function(dataItem) {
	                return {value: dataItem.bj, data: dataItem};
	            })
	        };
	    },
	    onSelect: function (suggestion) {
			$("#skbjid").val(suggestion.data.xx04id);
			$("#skbj").val(suggestion.data.bj);
	    }
    });

});
